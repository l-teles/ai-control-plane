name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install bandit
        run: pip install -r .github/requirements-security.txt
      - name: Run bandit
        run: bandit -q -lll -r src/ai_ctrl_plane/

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install pip-audit and dependencies
        run: |
          # Upgrade pip before auditing — the runner's preinstalled pip is
          # itself scanned by ``pip-audit`` (which audits the whole env),
          # so a CVE in pip's bundled version would fail the job even when
          # project deps are clean. Pulling the latest pip lets us pick up
          # a fix automatically once one is published.
          python -m pip install --upgrade pip
          pip install -r .github/requirements-security.txt
          pip install -e .
      - name: Audit dependencies
        # CVE-2026-3219 is a vuln in pip itself (the runner's bundled pip,
        # not a project dep). No fixed pip release is out yet; ignore the
        # specific CVE so unrelated PRs don't get blocked, and remove this
        # ignore once upstream pip publishes the fix.
        run: pip-audit --ignore-vuln CVE-2026-3219

  zizmor:
    name: zizmor (GitHub Actions security)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    # Scorecard only supports push and schedule on the default branch
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
