name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Extract version without v prefix
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1.12.0
        with:
          release-notes: ${{ github.event.release.body }}
          latest-version: ${{ steps.version.outputs.version }}

      - name: Create PR with changelog update
        id: changelog-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update CHANGELOG for ${{ github.event.release.tag_name }}"
          branch: docs/changelog-${{ github.event.release.tag_name }}
          base: main
          title: "docs: update CHANGELOG for ${{ github.event.release.tag_name }}"
          body: Automated changelog update for release ${{ github.event.release.tag_name }}.
          add-paths: CHANGELOG.md
          delete-branch: true

      - name: Enable auto-merge
        if: steps.changelog-pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.changelog-pr.outputs.pull-request-number }}
          merge-method: squash
