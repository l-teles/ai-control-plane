version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "deps:"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /.github
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "ci:"
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "ci:"
    open-pull-requests-limit: 5
    labels:
      - ci
    cooldown:
      default-days: 7
