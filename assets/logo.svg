<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#1c2128"/>
  <!-- Three slider tracks -->
  <rect x="6" y="8" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="6" y="14.5" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="6" y="21" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <!-- Filled portions (different levels = control plane) -->
  <rect x="6" y="8" width="16" height="3" rx="1.5" fill="#bc8cff"/>
  <rect x="6" y="14.5" width="11" height="3" rx="1.5" fill="#d29922"/>
  <rect x="6" y="21" width="14" height="3" rx="1.5" fill="#3fb950"/>
  <!-- Slider knobs -->
  <circle cx="22" cy="9.5" r="2.5" fill="white" stroke="#bc8cff" stroke-width="1"/>
  <circle cx="17" cy="16" r="2.5" fill="white" stroke="#d29922" stroke-width="1"/>
  <circle cx="20" cy="22.5" r="2.5" fill="white" stroke="#3fb950" stroke-width="1"/>
</svg>
